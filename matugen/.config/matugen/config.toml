[config]

[theme]
mode = 'vibrant'
chroma_scale = 1     # 1.0 = default; try 1.1–1.3 for more vibrant colors
contrast_scale = 1    # slight contrast boost helps definition

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors-matugen.conf'
post_hook = 'pkill -SIGUSR1 kitty'
